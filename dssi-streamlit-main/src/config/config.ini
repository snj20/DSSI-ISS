[Directories]
models = models
metadata = metadata

[Model]
name = loan_approval
features = dep_cat,loan_term,cibil_score,log_residential_assets_value,log_loan_amount
categorical_features = dep_cat
numerical_features = loan_term,cibil_score,log_residential_assets_value,log_loan_amount
label = approved
test_size = 0.2

[Hyperparameters]
rf_n_estimators = 100
rf_max_depth = 10
rf_class_weight = balanced_subsample
rf_n_jobs = 2

[Evaluation]
fdr = 0.05
recall = 0.8